name: CI

on:
  pull_request:
  push:
    branches: [main, next]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test -race ./...

      - name: Test build version injection
        env:
          SENTINEL_EXPECT_VERSION: ci-dev
        run: go test -ldflags "-X github.com/coollabsio/sentinel/pkg/config.Version=ci-dev" ./pkg/config

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2

      - name: Build
        run: go build ./...

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sentinel:ci
